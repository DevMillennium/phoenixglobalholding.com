# PostgreSQL local (obrigatório para Prisma — o projeto usa provider postgresql).
# Uso: docker compose up -d
# Em .env.local: DATABASE_URL="postgresql://phoenix:phoenix@localhost:5432/phoenix"
# Depois: npx prisma migrate deploy && npm run dev

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: phoenix
      POSTGRES_PASSWORD: phoenix
      POSTGRES_DB: phoenix
    ports:
      - "5432:5432"
    volumes:
      - phoenix_pg:/var/lib/postgresql/data

volumes:
  phoenix_pg:
