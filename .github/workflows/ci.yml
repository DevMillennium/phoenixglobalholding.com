name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      # Mesmo provider SQLite do schema: aplica migrações antes do build (paridade com Vercel se usar migrate deploy no deploy).
      - name: Prisma migrate deploy (SQLite CI)
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Build Next.js
        run: npm run build
        env:
          DATABASE_URL: "file:./dev.db"

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Testes E2E
        run: npm run test:e2e
        env:
          CI: true
