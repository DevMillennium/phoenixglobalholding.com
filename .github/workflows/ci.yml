name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: phoenix
          POSTGRES_PASSWORD: phoenix
          POSTGRES_DB: phoenix
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U phoenix -d phoenix"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://phoenix:phoenix@localhost:5432/phoenix
      DIRECT_URL: postgresql://phoenix:phoenix@localhost:5432/phoenix

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Instalar dependências
        run: npm ci

      - name: ESLint
        run: npm run lint

      - name: Build Next.js (migrate deploy + next build)
        run: npm run build

      - name: Instalar Chromium (Playwright)
        run: npx playwright install --with-deps chromium

      - name: Testes E2E
        run: npm run test:e2e
        env:
          CI: true
